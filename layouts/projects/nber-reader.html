{{ define "main" }}
<div id="nber-reader">
    <div id="upload-section">
        <div class="reader-header">
            <h1>NBER Paper Reader</h1>
            <p class="reader-subtitle">Split-view reader: read the paper on one side, browse figures on the other.</p>
        </div>
        <div class="upload-inner">
            <div class="input-group">
                <label for="pdf-upload" class="upload-label">
                    <span class="upload-icon">PDF</span>
                    <span>Drop a PDF here or click to upload</span>
                    <input type="file" id="pdf-upload" accept=".pdf" />
                </label>
            </div>
            <div class="or-divider"><span>or</span></div>
            <div class="input-group url-group">
                <input type="text" id="pdf-url" placeholder="Paste NBER paper URL (e.g. https://www.nber.org/papers/w34836)" />
                <button id="load-url-btn">Load</button>
            </div>
            <p class="note">Note: Recent NBER papers require institutional access. If the URL doesn't work, download the PDF and upload it directly.</p>
        </div>
    </div>

    <div id="loading-section" style="display:none;">
        <div class="spinner"></div>
        <p id="loading-status">Loading PDF...</p>
    </div>

    <div id="split-view" style="display:none;">
        <div class="split-controls">
            <span id="paper-title" class="paper-title"></span>
            <button id="reset-btn" class="reset-btn">New paper</button>
        </div>
        <div class="split-container">
            <div class="pane" id="pane-read">
                <div class="pane-header">
                    <span class="pane-label">Read</span>
                    <div class="pane-zoom">
                        <button class="zoom-btn" data-pane="read" data-dir="-1">-</button>
                        <span class="zoom-level" id="zoom-read">100%</span>
                        <button class="zoom-btn" data-pane="read" data-dir="1">+</button>
                    </div>
                    <div class="pane-nav">
                        <span class="page-indicator" id="page-read">1</span>
                        <span class="page-sep">/</span>
                        <span class="page-total" id="total-read"></span>
                    </div>
                </div>
                <div class="pane-scroll" id="scroll-read">
                    <div class="pane-pages" id="pages-read"></div>
                </div>
            </div>
            <div class="pane-divider" id="pane-divider"></div>
            <div class="pane" id="pane-figures">
                <div class="pane-header">
                    <span class="pane-label">Figures</span>
                    <div class="pane-zoom">
                        <button class="zoom-btn" data-pane="figures" data-dir="-1">-</button>
                        <span class="zoom-level" id="zoom-figures">100%</span>
                        <button class="zoom-btn" data-pane="figures" data-dir="1">+</button>
                    </div>
                    <div class="pane-nav">
                        <span class="page-indicator" id="page-figures">1</span>
                        <span class="page-sep">/</span>
                        <span class="page-total" id="total-figures"></span>
                    </div>
                </div>
                <div class="pane-scroll" id="scroll-figures">
                    <div class="pane-pages" id="pages-figures"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Reset for full-screen reader */
    #nber-reader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        background: #f5f5f5;
        z-index: 9999;
    }

    /* Upload section — centered */
    #upload-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }

    .reader-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .reader-header h1 {
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
    }

    .reader-subtitle {
        color: #666;
        font-size: 0.95rem;
    }

    .upload-inner {
        max-width: 500px;
        width: 100%;
    }

    .input-group { margin-bottom: 1rem; }

    .upload-label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 2rem;
        border: 2px dashed #ccc;
        border-radius: 8px;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        background: white;
    }

    .upload-label:hover, .upload-label.dragover {
        border-color: #007acc;
        background: #f0f7ff;
    }

    .upload-icon {
        font-size: 1.2rem;
        font-weight: bold;
        background: #007acc;
        color: white;
        padding: 0.4rem 0.8rem;
        border-radius: 4px;
    }

    .upload-label input[type="file"] { display: none; }

    .or-divider {
        text-align: center;
        margin: 1rem 0;
        color: #999;
        position: relative;
    }

    .or-divider::before, .or-divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: #ddd;
    }

    .or-divider::before { left: 0; }
    .or-divider::after { right: 0; }

    .url-group { display: flex; gap: 0.5rem; }

    #pdf-url {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.9rem;
    }

    #load-url-btn {
        padding: 0.75rem 1.5rem;
        background: #007acc;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9rem;
        white-space: nowrap;
    }

    #load-url-btn:hover { background: #005fa3; }

    .note {
        font-size: 0.8rem;
        color: #999;
        margin-top: 0.5rem;
    }

    /* Loading */
    #loading-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #eee;
        border-top-color: #007acc;
        border-radius: 50%;
        margin-bottom: 1rem;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Split view controls */
    .split-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.4rem 0.75rem;
        background: #1a1a2e;
        color: white;
        flex-shrink: 0;
    }

    .paper-title {
        font-weight: 600;
        font-size: 0.85rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        margin-right: 0.5rem;
    }

    .reset-btn {
        padding: 0.3rem 0.7rem;
        background: rgba(255,255,255,0.15);
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8rem;
        flex-shrink: 0;
    }

    .reset-btn:hover { background: rgba(255,255,255,0.25); }

    /* Split container */
    #split-view {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .split-container {
        flex: 1;
        display: flex;
        overflow: hidden;
    }

    /* Landscape: side by side */
    .split-container {
        flex-direction: row;
    }

    .pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
        min-height: 0;
    }

    .pane-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.3rem 0.6rem;
        background: #16213e;
        color: white;
        flex-shrink: 0;
        font-size: 0.8rem;
    }

    .pane-label {
        font-weight: 600;
        margin-right: auto;
    }

    .pane-zoom {
        display: flex;
        align-items: center;
        gap: 0.25rem;
    }

    .zoom-btn {
        width: 26px;
        height: 26px;
        border: none;
        background: rgba(255,255,255,0.15);
        color: white;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .zoom-btn:hover { background: rgba(255,255,255,0.3); }

    .zoom-level {
        font-size: 0.75rem;
        min-width: 36px;
        text-align: center;
    }

    .pane-nav {
        display: flex;
        align-items: center;
        gap: 2px;
        font-size: 0.75rem;
        color: rgba(255,255,255,0.7);
    }

    .page-indicator { color: white; }

    .pane-scroll {
        flex: 1;
        overflow: auto;
        background: #e8e8e8;
        -webkit-overflow-scrolling: touch;
    }

    .pane-pages {
        transform-origin: top left;
    }

    .pane-pages .page-wrapper {
        position: relative;
    }

    .pane-pages canvas {
        display: block;
        width: 100%;
        height: auto;
        background: white;
    }

    .pane-pages .page-number {
        text-align: center;
        font-size: 0.7rem;
        color: #999;
        padding: 2px 0;
        background: #e8e8e8;
    }

    /* Divider */
    .pane-divider {
        width: 4px;
        background: #1a1a2e;
        flex-shrink: 0;
        cursor: col-resize;
    }

    /* Portrait: top and bottom */
    @media (orientation: portrait) {
        .split-container {
            flex-direction: column;
        }

        .pane-divider {
            width: auto;
            height: 4px;
            cursor: row-resize;
        }
    }

    /* Small screens */
    @media (max-width: 600px) {
        .reader-header h1 { font-size: 1.4rem; }
        .url-group { flex-direction: column; }
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs" type="module"></script>
<script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';

    const MAX_PIXEL_RATIO = 2;
    const effectivePixelRatio = Math.min(window.devicePixelRatio || 1, MAX_PIXEL_RATIO);
    const ZOOM_STEPS = [50, 75, 100, 125, 150, 200, 250, 300];

    let pdfDoc = null;

    // Per-pane state
    const panes = {
        read: { zoom: 100, zoomIdx: 2, observer: null, pages: null, scroll: null, rendered: new Set() },
        figures: { zoom: 100, zoomIdx: 2, observer: null, pages: null, scroll: null, rendered: new Set() }
    };

    // DOM
    const uploadSection = document.getElementById('upload-section');
    const loadingSection = document.getElementById('loading-section');
    const loadingStatus = document.getElementById('loading-status');
    const splitView = document.getElementById('split-view');
    const paperTitle = document.getElementById('paper-title');
    const resetBtn = document.getElementById('reset-btn');
    const pdfUpload = document.getElementById('pdf-upload');
    const pdfUrl = document.getElementById('pdf-url');
    const loadUrlBtn = document.getElementById('load-url-btn');
    const uploadLabel = document.querySelector('.upload-label');

    // Init pane DOM refs
    for (const id of ['read', 'figures']) {
        panes[id].pages = document.getElementById(`pages-${id}`);
        panes[id].scroll = document.getElementById(`scroll-${id}`);
    }

    // Event listeners
    pdfUpload.addEventListener('change', (e) => {
        if (e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => loadPDF(new Uint8Array(ev.target.result));
            reader.readAsArrayBuffer(e.target.files[0]);
        }
    });

    loadUrlBtn.addEventListener('click', () => {
        const url = pdfUrl.value.trim();
        if (!url) return;
        let pdfUrlStr = url;
        const nberMatch = url.match(/nber\.org\/papers\/(w\d+)\/?$/);
        if (nberMatch) {
            pdfUrlStr = `https://www.nber.org/system/files/working_papers/${nberMatch[1]}/${nberMatch[1]}.pdf`;
        }
        loadPDF(pdfUrlStr);
    });

    pdfUrl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loadUrlBtn.click();
    });

    resetBtn.addEventListener('click', () => {
        pdfDoc = null;
        for (const id of ['read', 'figures']) {
            panes[id].pages.innerHTML = '';
            panes[id].rendered = new Set();
            if (panes[id].observer) panes[id].observer.disconnect();
            panes[id].zoom = 100;
            panes[id].zoomIdx = 2;
            document.getElementById(`zoom-${id}`).textContent = '100%';
            panes[id].pages.style.transform = '';
            panes[id].pages.style.width = '';
        }
        splitView.style.display = 'none';
        uploadSection.style.display = '';
        pdfUpload.value = '';
        pdfUrl.value = '';
    });

    // Drag and drop
    uploadLabel.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadLabel.classList.add('dragover');
    });
    uploadLabel.addEventListener('dragleave', () => uploadLabel.classList.remove('dragover'));
    uploadLabel.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadLabel.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type === 'application/pdf') {
            const reader = new FileReader();
            reader.onload = (ev) => loadPDF(new Uint8Array(ev.target.result));
            reader.readAsArrayBuffer(file);
        }
    });

    // Zoom buttons
    document.querySelectorAll('.zoom-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const paneId = btn.dataset.pane;
            const dir = parseInt(btn.dataset.dir, 10);
            const pane = panes[paneId];
            const newIdx = Math.max(0, Math.min(ZOOM_STEPS.length - 1, pane.zoomIdx + dir));
            if (newIdx === pane.zoomIdx) return;
            pane.zoomIdx = newIdx;
            pane.zoom = ZOOM_STEPS[newIdx];
            applyZoom(paneId);
        });
    });

    // Pinch-to-zoom
    for (const id of ['read', 'figures']) {
        let startDist = 0;
        let startZoom = 100;

        panes[id].scroll.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                startDist = getTouchDist(e.touches);
                startZoom = panes[id].zoom;
            }
        }, { passive: false });

        panes[id].scroll.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = getTouchDist(e.touches);
                const ratio = dist / startDist;
                const newZoom = Math.max(ZOOM_STEPS[0], Math.min(ZOOM_STEPS[ZOOM_STEPS.length - 1], Math.round(startZoom * ratio)));
                panes[id].zoom = newZoom;
                // Find closest zoom step index
                panes[id].zoomIdx = ZOOM_STEPS.reduce((best, v, i) =>
                    Math.abs(v - newZoom) < Math.abs(ZOOM_STEPS[best] - newZoom) ? i : best, 0);
                applyZoom(id);
            }
        }, { passive: false });
    }

    function getTouchDist(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function applyZoom(paneId) {
        const pane = panes[paneId];
        const scale = pane.zoom / 100;
        document.getElementById(`zoom-${paneId}`).textContent = pane.zoom + '%';
        pane.pages.style.transformOrigin = 'top left';
        pane.pages.style.transform = `scale(${scale})`;
        pane.pages.style.width = (100 / scale) + '%';
    }

    // Scroll tracking — update page indicator
    for (const id of ['read', 'figures']) {
        panes[id].scroll.addEventListener('scroll', () => {
            updatePageIndicator(id);
        }, { passive: true });
    }

    function updatePageIndicator(paneId) {
        const scroll = panes[paneId].scroll;
        const pages = scroll.querySelectorAll('.page-wrapper');
        const scrollTop = scroll.scrollTop;
        const scrollCenter = scrollTop + scroll.clientHeight / 3;

        let currentPage = 1;
        for (const pw of pages) {
            const top = pw.offsetTop * (panes[paneId].zoom / 100);
            const bottom = top + pw.offsetHeight * (panes[paneId].zoom / 100);
            if (scrollCenter >= top && scrollCenter < bottom) {
                currentPage = parseInt(pw.dataset.pageNum, 10);
                break;
            }
        }
        document.getElementById(`page-${paneId}`).textContent = currentPage;
    }

    async function loadPDF(source) {
        uploadSection.style.display = 'none';
        loadingSection.style.display = '';
        loadingStatus.textContent = 'Loading PDF...';

        try {
            const loadingTask = pdfjsLib.getDocument(source);
            pdfDoc = await loadingTask.promise;

            loadingStatus.textContent = 'Preparing viewer...';

            // Extract title from first page
            const firstPage = await pdfDoc.getPage(1);
            const textContent = await firstPage.getTextContent();
            const firstPageText = textContent.items.map(item => item.str).join(' ');
            paperTitle.textContent = extractTitle(firstPageText);

            // Get reference dimensions for placeholders
            const refViewport = firstPage.getViewport({ scale: 1 });
            const aspectRatio = refViewport.height / refViewport.width;

            // Build both panes with all pages
            for (const id of ['read', 'figures']) {
                buildPanePages(id, pdfDoc.numPages, aspectRatio);
                document.getElementById(`total-${id}`).textContent = pdfDoc.numPages;
            }

            loadingSection.style.display = 'none';
            splitView.style.display = '';

            // Set up lazy observers after layout is ready
            requestAnimationFrame(() => {
                for (const id of ['read', 'figures']) {
                    setupPaneObserver(id);
                }
            });
        } catch (err) {
            loadingSection.style.display = 'none';
            uploadSection.style.display = '';
            console.error(err);
            alert('Failed to load PDF: ' + err.message + '\n\nIf loading from URL, try downloading the PDF and uploading it directly.');
        }
    }

    function extractTitle(firstPageText) {
        const nberMatch = firstPageText.match(/NBER WORKING PAPER SERIES\s+(.+?)(?:\s{3,}|\n)/i);
        if (nberMatch) return nberMatch[1].trim();
        const lines = firstPageText.split(/\s{3,}/);
        for (const line of lines) {
            const trimmed = line.trim();
            if (trimmed.length > 10 && !trimmed.match(/^NBER/i) && !trimmed.match(/^Working Paper/i)) {
                return trimmed.substring(0, 100);
            }
        }
        return 'NBER Paper';
    }

    function buildPanePages(paneId, numPages, aspectRatio) {
        const container = panes[paneId].pages;
        container.innerHTML = '';

        for (let i = 0; i < numPages; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.dataset.pageIdx = i;
            wrapper.dataset.pageNum = i + 1;

            const canvas = document.createElement('canvas');
            // Set placeholder dimensions based on container width
            canvas.style.width = '100%';
            canvas.style.aspectRatio = `1 / ${aspectRatio}`;
            canvas.style.background = 'white';

            wrapper.appendChild(canvas);

            const label = document.createElement('div');
            label.className = 'page-number';
            label.textContent = `Page ${i + 1}`;
            wrapper.appendChild(label);

            container.appendChild(wrapper);
        }
    }

    function setupPaneObserver(paneId) {
        const pane = panes[paneId];
        if (pane.observer) pane.observer.disconnect();

        pane.observer = new IntersectionObserver((entries) => {
            for (const entry of entries) {
                if (entry.isIntersecting) {
                    const wrapper = entry.target;
                    const pageIdx = parseInt(wrapper.dataset.pageIdx, 10);
                    if (!pane.rendered.has(pageIdx)) {
                        pane.rendered.add(pageIdx);
                        renderPageCanvas(paneId, wrapper, pageIdx);
                    }
                    pane.observer.unobserve(wrapper);
                }
            }
        }, {
            root: pane.scroll,
            rootMargin: '600px'
        });

        const wrappers = pane.pages.querySelectorAll('.page-wrapper');
        for (const w of wrappers) {
            pane.observer.observe(w);
        }
    }

    async function renderPageCanvas(paneId, wrapper, pageIdx) {
        const canvas = wrapper.querySelector('canvas');
        const page = await pdfDoc.getPage(pageIdx + 1);
        const unscaledViewport = page.getViewport({ scale: 1 });

        // Render at pane's actual width for good quality
        const paneWidth = panes[paneId].scroll.clientWidth;
        const scale = (paneWidth * effectivePixelRatio) / unscaledViewport.width;
        const viewport = page.getViewport({ scale });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
    }

    // Divider drag to resize panes
    const divider = document.getElementById('pane-divider');
    let isDragging = false;

    divider.addEventListener('mousedown', startDrag);
    divider.addEventListener('touchstart', startDrag, { passive: false });

    function startDrag(e) {
        e.preventDefault();
        isDragging = true;
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchmove', onDrag, { passive: false });
        document.addEventListener('touchend', stopDrag);
    }

    function onDrag(e) {
        if (!isDragging) return;
        e.preventDefault();
        const container = document.querySelector('.split-container');
        const rect = container.getBoundingClientRect();
        const isPortrait = window.matchMedia('(orientation: portrait)').matches;

        const paneRead = document.getElementById('pane-read');
        const paneFigures = document.getElementById('pane-figures');

        let pos;
        if (isPortrait) {
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            pos = (clientY - rect.top) / rect.height;
        } else {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            pos = (clientX - rect.left) / rect.width;
        }

        pos = Math.max(0.2, Math.min(0.8, pos));
        paneRead.style.flex = `${pos}`;
        paneFigures.style.flex = `${1 - pos}`;
    }

    function stopDrag() {
        isDragging = false;
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', stopDrag);
        document.removeEventListener('touchmove', onDrag);
        document.removeEventListener('touchend', stopDrag);
    }
</script>
